<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지능형 서비스 구축 (화면 예시)</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --primary: #1e40af;
            --primary-light: #dbeafe;
            --secondary: #0ea5e9;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --bg-gradient: linear-gradient(135deg, #f8fafc 0%, #e2e8f0 100%);
            --card-bg: rgba(255, 255, 255, 0.85);
            --card-border: rgba(255, 255, 255, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background: var(--bg-gradient);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Ambient background effects */
        .ambient-light {
            position: absolute;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(14,165,233,0.15) 0%, rgba(255,255,255,0) 60%);
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: -1;
            pointer-events: none;
        }

        .ambient-light-2 {
            position: absolute;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(30,64,175,0.1) 0%, rgba(255,255,255,0) 60%);
            top: 0%;
            right: 0%;
            transform: translate(20%, -20%);
            z-index: -1;
            pointer-events: none;
        }

        .container {
            max-width: 1100px;
            width: 90%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 40px 0;
        }

        .header {
            text-align: center;
            margin-bottom: 70px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            color: #1e293b;
            letter-spacing: -0.5px;
            background: #ffffff;
            display: inline-block;
            padding: 16px 50px;
            border-radius: 60px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05), inset 0 0 0 1px rgba(255,255,255,1);
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 15%;
            width: 70%;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            opacity: 0.8;
        }

        .flow-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 40px;
        }

        .column {
            flex: 1;
            max-width: 420px;
            display: flex;
            flex-direction: column;
            gap: 24px;
            background: rgba(255, 255, 255, 0.4);
            padding: 40px 30px;
            border-radius: 30px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 20px 40px rgba(0,0,0,0.02);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .column-title {
            text-align: center;
            font-size: 1.4rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 16px;
            letter-spacing: 0.5px;
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 26px 30px;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
            position: relative;
            overflow: hidden;
            min-height: 100px;
        }

        .card::after {
            content: '→';
            position: absolute;
            right: 25px;
            opacity: 0;
            transform: translateX(-15px);
            transition: all 0.3s ease;
            color: var(--primary);
            font-size: 1.4rem;
            font-weight: bold;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px rgba(30, 64, 175, 0.12);
            border-color: rgba(30, 64, 175, 0.25);
        }

        .card:hover::after {
            opacity: 1;
            transform: translateX(0);
        }

        .card-title {
            font-size: 1.25rem;
            font-weight: 600;
            color: var(--text-main);
            transition: all 0.3s ease;
            text-align: center;
            line-height: 1.4;
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .card:hover .card-title {
            color: var(--primary);
            transform: translateX(-10px);
        }

        .subtitle {
            font-size: 1.05rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        
        .card:hover .subtitle {
            color: var(--secondary);
        }

        .arrow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .arrow-svg {
            width: 80px;
            height: 80px;
            fill: url(#arrow-gradient);
            filter: drop-shadow(0 10px 15px rgba(14, 165, 233, 0.3));
            animation: bounceRight 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
        }

        @keyframes bounceRight {
            0%, 100% { transform: translateX(0); }
            50% { transform: translateX(10px); }
        }

        @media (max-width: 900px) {
            .flow-container {
                flex-direction: column;
                align-items: center;
            }
            .column {
                width: 100%;
                max-width: 500px;
            }
            .arrow-container {
                padding: 20px 0;
            }
            .arrow-svg {
                transform: rotate(90deg);
                animation: bounceDown 2s infinite cubic-bezier(0.4, 0, 0.2, 1);
            }
            @keyframes bounceDown {
                0%, 100% { transform: rotate(90deg) translateY(0); }
                50% { transform: rotate(90deg) translateY(-10px); }
            }
            .header h1 {
                font-size: 2rem;
                padding: 14px 30px;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-light"></div>
    <div class="ambient-light-2"></div>
    
    <div class="container">
        <div class="header">
            <h1>지능형 서비스 구축 (화면 예시)</h1>
        </div>
        
        <div class="flow-container">
            <!-- AS-IS Column -->
            <div class="column">
                <div class="column-title">AS-IS</div>
                <a href="https://library.nih.go.kr/ncmiklib/index/index.do" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">국립의과학지식센터 누리집</span>
                </a>
                <a href="https://library.nih.go.kr/save/index/index.do" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">질병재난 아카이브(SAVE)</span>
                </a>
            </div>

            <!-- Arrow -->
            <div class="arrow-container">
                <svg class="arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <defs>
                        <linearGradient id="arrow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                            <stop offset="0%" stop-color="#1e40af" />
                            <stop offset="100%" stop-color="#0ea5e9" />
                        </linearGradient>
                    </defs>
                    <path d="M4 10h9V5l9 7-9 7v-5H4v-4z" />
                </svg>
            </div>

            <!-- To-Be Column -->
            <div class="column">
                <div class="column-title">To-Be</div>
                <a href="./remix_-ncmik-search-assist/dist/index.html" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">
                        누리집
                        <span class="subtitle">(지능형 서비스 예시)</span>
                    </span>
                </a>
                <a href="./remix_-save-portal/dist/index.html" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">
                        SAVE
                        <span class="subtitle">(자료관리 예시)</span>
                    </span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
