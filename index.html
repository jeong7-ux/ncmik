<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지능형 서비스 구축 (화면 예시)</title>
    <link href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css" rel="stylesheet">
    <style>
        :root {
            --primary: #3b82f6;
            --primary-glow: rgba(59, 130, 246, 0.5);
            --secondary: #8b5cf6;
            --secondary-glow: rgba(139, 92, 246, 0.5);
            --bg-color: #0f172a;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --card-bg: rgba(30, 41, 59, 0.7);
            --card-border: rgba(255, 255, 255, 0.1);
            --card-hover-border: rgba(255, 255, 255, 0.3);
            --glass-bg: rgba(15, 23, 42, 0.6);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, Roboto, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            overflow-x: hidden;
            position: relative;
        }

        /* Animated Ambient Background */
        .ambient-wrapper {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            z-index: -1;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .ambient-orb {
            position: absolute;
            border-radius: 50%;
            filter: blur(80px);
            opacity: 0.5;
            animation: float 20s infinite ease-in-out alternate;
        }

        .orb-1 {
            width: 600px;
            height: 600px;
            background: var(--primary);
            top: -200px;
            left: -100px;
            animation-delay: 0s;
        }

        .orb-2 {
            width: 500px;
            height: 500px;
            background: var(--secondary);
            bottom: -100px;
            right: -100px;
            animation-delay: -5s;
        }

        .orb-3 {
            width: 400px;
            height: 400px;
            background: #0ea5e9;
            top: 40%;
            left: 50%;
            transform: translate(-50%, -50%);
            animation-delay: -10s;
            opacity: 0.3;
        }

        @keyframes float {
            0% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, 30px) scale(1.1); }
            100% { transform: translate(-30px, -50px) scale(0.9); }
        }

        .container {
            max-width: 1200px;
            width: 90%;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding: 60px 0;
        }

        .header {
            text-align: center;
            margin-bottom: 80px;
            animation: fadeInDown 1s ease-out forwards;
        }

        .header h1 {
            font-size: 3rem;
            font-weight: 800;
            letter-spacing: -1px;
            background: linear-gradient(135deg, #fff 0%, #cbd5e1 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: inline-block;
            position: relative;
        }

        .header h1::after {
            content: '';
            position: absolute;
            bottom: -10px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
            height: 4px;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            border-radius: 4px;
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .flow-container {
            display: flex;
            align-items: stretch;
            justify-content: center;
            gap: 50px;
            animation: fadeInUp 1s ease-out 0.3s forwards;
            opacity: 0;
        }

        .column {
            flex: 1;
            max-width: 450px;
            display: flex;
            flex-direction: column;
            gap: 28px;
            background: var(--glass-bg);
            padding: 50px 40px;
            border-radius: 32px;
            border: 1px solid var(--card-border);
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            position: relative;
            overflow: hidden;
        }

        .column::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
        }

        .column-title {
            text-align: center;
            font-size: 1.6rem;
            font-weight: 800;
            background: linear-gradient(135deg, var(--primary) 0%, var(--secondary) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .card {
            display: flex;
            align-items: center;
            justify-content: center;
            text-decoration: none;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 32px 30px;
            border-radius: 24px;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
            min-height: 120px;
        }

        .card::before {
            content: '';
            position: absolute;
            top: 0; left: -100%;
            width: 50%; height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255,255,255,0.05), transparent);
            transform: skewX(-20deg);
            transition: all 0.6s ease;
        }

        .card::after {
            content: '↗';
            position: absolute;
            right: 25px;
            top: 50%;
            transform: translateY(-50%) translateX(-15px);
            opacity: 0;
            transition: all 0.4s ease;
            color: var(--text-main);
            font-size: 1.5rem;
            font-weight: 300;
        }

        .card:hover {
            transform: translateY(-8px) scale(1.02);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4), 0 0 20px var(--primary-glow);
            border-color: var(--card-hover-border);
            background: rgba(45, 55, 72, 0.8);
        }

        .card:hover::before {
            left: 200%;
        }

        .card:hover::after {
            opacity: 1;
            transform: translateY(-50%) translateX(0);
        }

        .card-title {
            font-size: 1.35rem;
            font-weight: 700;
            color: var(--text-main);
            transition: all 0.3s ease;
            text-align: center;
            line-height: 1.5;
            display: flex;
            flex-direction: column;
            gap: 8px;
            position: relative;
            z-index: 2;
        }

        .card:hover .card-title {
            transform: translateX(-10px);
        }

        .subtitle {
            font-size: 1rem;
            font-weight: 500;
            color: var(--text-muted);
            transition: color 0.3s ease;
        }
        
        .card:hover .subtitle {
            color: #e2e8f0;
        }

        .arrow-container {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 0 20px;
        }

        .arrow-wrapper {
            position: relative;
            width: 80px;
            height: 80px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .arrow-svg {
            width: 60px;
            height: 60px;
            fill: none;
            stroke: url(#arrow-gradient);
            stroke-width: 2;
            stroke-linecap: round;
            stroke-linejoin: round;
            filter: drop-shadow(0 0 10px var(--primary-glow));
            animation: pulseArrow 2s infinite ease-in-out;
        }

        .arrow-line {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, var(--primary), var(--secondary), transparent);
            opacity: 0.3;
            animation: scanline 2s infinite linear;
        }

        @keyframes scanline {
            0% { transform: translateX(-100%); }
            100% { transform: translateX(100%); }
        }

        @keyframes pulseArrow {
            0%, 100% { transform: translateX(0) scale(1); filter: drop-shadow(0 0 10px var(--primary-glow)); }
            50% { transform: translateX(15px) scale(1.1); filter: drop-shadow(0 0 20px var(--secondary-glow)); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 900px) {
            .flow-container {
                flex-direction: column;
                align-items: center;
            }
            .column {
                width: 100%;
                max-width: 100%;
            }
            .arrow-container {
                padding: 30px 0;
            }
            .arrow-svg {
                transform: rotate(90deg);
                animation: pulseArrowDown 2s infinite ease-in-out;
            }
            .arrow-line {
                width: 2px;
                height: 100%;
                background: linear-gradient(180deg, transparent, var(--primary), var(--secondary), transparent);
                animation: scanlineDown 2s infinite linear;
            }
            @keyframes scanlineDown {
                0% { transform: translateY(-100%); }
                100% { transform: translateY(100%); }
            }
            @keyframes pulseArrowDown {
                0%, 100% { transform: rotate(90deg) translateY(0) scale(1); }
                50% { transform: rotate(90deg) translateY(-15px) scale(1.1); }
            }
            .header h1 {
                font-size: 2.2rem;
            }
        }
    </style>
</head>
<body>
    <div class="ambient-wrapper">
        <div class="ambient-orb orb-1"></div>
        <div class="ambient-orb orb-2"></div>
        <div class="ambient-orb orb-3"></div>
    </div>
    
    <div class="container">
        <div class="header">
            <h1>지능형 서비스 구축 (화면 예시)</h1>
        </div>
        
        <div class="flow-container">
            <!-- AS-IS Column -->
            <div class="column">
                <div class="column-title">AS-IS</div>
                <a href="https://library.nih.go.kr/ncmiklib/index/index.do" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">국립의과학지식센터 누리집</span>
                </a>
                <a href="https://library.nih.go.kr/save/index/index.do" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">질병재난 아카이브(SAVE)</span>
                </a>
            </div>

            <!-- Arrow -->
            <div class="arrow-container">
                <div class="arrow-wrapper">
                    <div class="arrow-line"></div>
                    <svg class="arrow-svg" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                        <defs>
                            <linearGradient id="arrow-gradient" x1="0%" y1="0%" x2="100%" y2="0%">
                                <stop offset="0%" stop-color="#3b82f6" />
                                <stop offset="100%" stop-color="#8b5cf6" />
                            </linearGradient>
                        </defs>
                        <path d="M5 12h14M12 5l7 7-7 7" />
                    </svg>
                </div>
            </div>

            <!-- To-Be Column -->
            <div class="column">
                <div class="column-title">To-Be</div>
                <a href="./remix_-ncmik-search-assist/dist/index.html" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">
                        누리집
                        <span class="subtitle">(지능형 서비스 예시)</span>
                    </span>
                </a>
                <a href="./remix_-save-portal/dist/index.html" class="card" target="_blank" rel="noopener noreferrer">
                    <span class="card-title">
                        SAVE
                        <span class="subtitle">(자료관리 예시)</span>
                    </span>
                </a>
            </div>
        </div>
    </div>
</body>
</html>
